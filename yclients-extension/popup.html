<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 350px; padding: 15px; font-family: -apple-system, sans-serif; }
    label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; }
    input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box; }
    button { background: #ff6b00; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: 600; }
    button:hover { background: #e55e00; }
    .status { margin-top: 10px; font-size: 12px; color: #4caf50; display: none; }
  </style>
</head>
<body>
  <h3>⚙️ Настройки задачника</h3>
  
  <label>URL сервера:</label>
  <input type="text" id="urlInput" placeholder="http://localhost:3000/?salon_id=827610&hash=test">
  
  <label>Текст кнопки:</label>
  <input type="text" id="buttonTextInput" placeholder="📋 Задачи">
  
  <button id="saveBtn">Сохранить</button>
  <div class="status" id="status">✅ Сохранено!</div>

  <script src="popup.js"></script>
</body>
</html>
